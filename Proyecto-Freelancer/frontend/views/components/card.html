<!--Aqui creamos el componente card-->

<div class="card">
    <div class="card__title">{{title}}</div>

    <div class="card__icons">
        <img src="{{icon1}}" alt="icono principal" class="card__icon card__icon--primary">
        <img src="{{icon2}}" alt="icono secundario" class="card__icon card__icon--secundary">
    </div>

    <div class="card__description">{{description}}</div>


</div>
