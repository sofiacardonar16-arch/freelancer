<!--Formulario contacto-->
<div class="contact-form__title">Dilegencia los campos y contactanos</div>
<form class="contact-form">


    <div class="contact-form__row">
    <!--input nombre-->
        
        <label class="contact-form__label">
            Nombre
            <input type="text" class="contact-form__input" placeholder="Ingrese su nombre" required> 

        </label>
    
        <!--input telefono-->
        <label class="contact-form__label">
            teléfono
            <input type="tel" class="contact-form__input" placeholder="Ingrese su teléfono" required>
        </label>
    </div>

    <!--input correo-->
    <label class="contact-form__label">
        Correo
        <input type="email" class="contact-form__input" placeholder="Ingrese su correo electrónico" required>
    </label>


    <!--input mensaje-->
    <label class="contact-form__label">
        Mensaje
        <input type="message" class="contact-form__message" placeholder="Ingrese aquí tu mensaje.." required>
    </label>

    <!-- Botón para enviar formulario-->
     <button type="submit" class="contact-form__button">Enviar</button>
</form>
